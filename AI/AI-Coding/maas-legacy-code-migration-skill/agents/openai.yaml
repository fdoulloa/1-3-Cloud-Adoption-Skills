interface:
  display_name: "MaaS Legacy Code Migration"
  short_description: "Legacy code understanding, refactoring, and migration with behavior preservation"
  default_prompt: "Analyze the legacy codebase, identify migration targets, and produce a reviewable batch migration plan. Preserve behavior with characterization tests. Every batch requires human review."
  personas:
    - name: migration-specialist
      reference: "../shared/agents/migration-specialist.yaml"
      trigger: "Always for legacy migration"
    - name: security-auditor
      reference: "../shared/agents/security-auditor.yaml"
      trigger: "Per-batch security audit"
  model:
    base_url: "https://api-ap-southeast-1.modelarts-maas.com/openai/v1"
    name: "glm-5.1"
    context_tokens: 190000
    max_output_tokens: 32768
