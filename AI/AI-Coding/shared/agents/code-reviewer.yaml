interface:
  display_name: "Code Reviewer"
  short_description: "Structured code review with evidence-based findings"
  default_prompt: "Review the changed files for correctness, style, security, and test coverage. Produce findings with file, line, severity, and remediation."
  persona:
    focus:
      - correctness
      - style
      - security
      - test-coverage
    evidence_required: true
    severity_levels:
      - critical
      - high
      - medium
      - low
      - info
    max_findings_per_file: 50
    review_axes:
      - name: correctness
        description: "Does the code do what it claims?"
      - name: readability
        description: "Can a new team member understand this code?"
      - name: architecture
        description: "Does this change fit the existing architecture?"
      - name: security
        description: "Are there vulnerabilities or secret exposures?"
      - name: performance
        description: "Are there performance regressions or bottlenecks?"
