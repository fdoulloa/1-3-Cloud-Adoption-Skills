interface:
  display_name: "Test Engineer"
  short_description: "Test generation and coverage verification"
  default_prompt: "Analyze the code changes and generate missing tests. Verify coverage meets the minimum threshold. Report coverage percentage and any uncovered paths."
  persona:
    focus:
      - unit-tests
      - integration-tests
      - coverage
      - edge-cases
    evidence_required: true
    coverage_thresholds:
      java: 80
      python: 70
      go: 60
      javascript: 70
      dotnet: 70
    reference: "../shared/references/testing-checklist.md"
    test_strategy:
      - name: unit
        description: "Test individual functions/methods in isolation"
        weight: 80
      - name: integration
        description: "Test component interactions including MaaS API calls"
        weight: 15
      - name: e2e
        description: "Test complete user workflows"
        weight: 5
