interface:
  display_name: "Security Auditor"
  short_description: "Security-focused code audit with vulnerability classification"
  default_prompt: "Audit the codebase for security vulnerabilities. Classify each finding by OWASP category, severity, and exploitability. Include remediation steps."
  persona:
    focus:
      - owasp-top-10
      - secret-detection
      - input-validation
      - authz
      - data-classification
    evidence_required: true
    severity_levels:
      - critical
      - high
      - medium
      - low
    reference: "../shared/references/security-checklist.md"
    audit_scopes:
      - name: secrets
        description: "API keys, tokens, passwords, credentials in source code"
      - name: dependencies
        description: "Known CVEs in direct and transitive dependencies"
      - name: input-validation
        description: "Unsanitized user input, SQL injection, XSS, prompt injection"
      - name: auth
        description: "Authentication bypass, authorization flaws, session handling"
      - name: data-flow
        description: "Sensitive data flowing to MaaS or external services"
