interface:
  display_name: "MaaS Spec-Plan-Build-Test"
  short_description: "Full engineering workflow with gated phase transitions"
  default_prompt: "Execute the Spec-Plan-Build-Test workflow. Start with requirements, produce specification, plan, implementation, and tests. Each phase must pass its gate before advancing. Plan phase requires human approval."
  personas:
    - name: code-reviewer
      reference: "../shared/agents/code-reviewer.yaml"
      trigger: "Build phase quality gate"
    - name: test-engineer
      reference: "../shared/agents/test-engineer.yaml"
      trigger: "Test phase"
  model:
    base_url: "https://api-ap-southeast-1.modelarts-maas.com/openai/v1"
    name: "glm-5.1"
    context_tokens: 190000
    max_output_tokens: 32768
