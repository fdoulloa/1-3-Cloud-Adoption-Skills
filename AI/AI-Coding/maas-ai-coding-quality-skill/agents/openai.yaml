interface:
  display_name: "MaaS AI Coding Quality Gate"
  short_description: "Run quality gates on AI-generated code"
  default_prompt: "Run the quality gate (lint, test, coverage, security) on the changed files. Block commit if any gate fails. Produce evidence artifacts."
  persona:
    focus:
      - quality-gates
      - lint-enforcement
      - coverage-verification
      - security-gating
    evidence_required: true
    reference: "../shared/agents/code-reviewer.yaml"
  model:
    base_url: "https://api-ap-southeast-1.modelarts-maas.com/openai/v1"
    name: "glm-5.1"
    context_tokens: 190000
    max_output_tokens: 32768
