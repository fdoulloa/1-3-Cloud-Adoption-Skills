interface:
  display_name: "MaaS Code Review and Security"
  short_description: "Structured code review and security audit with evidence-based findings"
  default_prompt: "Review the changed files for correctness, style, security, and test coverage. Run security audit for OWASP Top 10, secret detection, and dependency vulnerabilities. Produce findings with evidence."
  personas:
    - name: code-reviewer
      reference: "../shared/agents/code-reviewer.yaml"
      trigger: "Always on code review"
    - name: security-auditor
      reference: "../shared/agents/security-auditor.yaml"
      trigger: "On --with-security flag or Gate 4 of quality skill"
  model:
    base_url: "https://api-ap-southeast-1.modelarts-maas.com/openai/v1"
    name: "glm-5.1"
    context_tokens: 190000
    max_output_tokens: 32768
