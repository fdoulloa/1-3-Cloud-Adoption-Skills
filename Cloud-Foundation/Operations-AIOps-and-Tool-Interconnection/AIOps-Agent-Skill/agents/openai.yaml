display_name: "AIOps Agent"
description: "Intelligent O&M agent for Huawei Cloud: anomaly detection, diagnosis, runbook-driven remediation, and auto-fix with approval gates."
default_prompt: "Analyze this alert and recommend remediation"
model: "glm-5.1"
api_base: "https://api-ap-southeast-1.modelarts-maas.com/openai/v1"
tools:
  - "aom.list_alarms"
  - "ces.show_metric_data"
  - "cts.list_traces"
  - "css.get_cluster_info"
  - "css_log.query"
  - "css_log.correlate"
  - "runbook.lookup"
  - "runbook.render"
  - "runbook.preview"
  - "diagnosis.recommend"
  - "css.scale_out_data_nodes"
  - "ecs.resize"
  - "cce.restart_pod"
  - "functiongraph.invoke"
action_levels:
  L0: "Read-only (auto-approved)"
  L1: "Suggest (auto-approved)"
  L2: "Execute (requires HMAC approval token)"
  L3: "Forbidden (blocked)"
